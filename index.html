<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti...</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  
  body { 
    width:100%; height:100vh; overflow:hidden; background:#ffffff; 
  }

  /* --- Capa de fondo de Hello Kitty --- */
  #hk-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('https://i.pinimg.com/originals/a2/46/66/a24666f7f6377726de3f03b22e11e0be.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0; /* Oculto al inicio */
    transition: opacity 2s ease; /* Transición suave de 2 segundos */
    z-index: 1;
    pointer-events: none;
  }
  
  #scene { width:100%; height:100vh; position:relative; overflow:hidden; z-index: 2; }
  #fc { position:absolute; bottom:0; left:0; width:100%; height:100%; }
  #pc { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  
  /* --- Estilos para las frases que aparecen con los tulipanes --- */
  .phrase {
    position: absolute;
    font-family: 'Georgia', serif;
    font-size: clamp(1.2rem, 3.5vw, 2.5rem);
    font-style: italic;
    color: #c0183a;
    opacity: 0;
    transition: opacity 2s ease;
    text-shadow: 2px 2px 5px rgba(255,255,255,0.9);
    pointer-events: none;
    z-index: 5;
    text-align: center;
    width: 100%;
  }

  /* --- Estilos para la pregunta final --- */
  #msg {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0.7);
    font-family:'Georgia',serif;
    font-size:clamp(2.5rem, 8vw, 5rem);
    font-weight: bold;
    color:#ff1493; /* Rosa fuerte que combina con Hello Kitty */
    /* Borde blanco grueso para que resalte sobre el fondo */
    text-shadow: 3px 3px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 2px 2px 0 #fff, 0px 5px 15px rgba(0,0,0,0.3); 
    letter-spacing:0.02em;
    opacity:0;
    text-align:center;
    white-space:nowrap;
    transition:opacity 2s ease, transform 2s cubic-bezier(0.175,0.885,0.32,1.275);
    pointer-events:none;
    z-index:10;
  }
  
  #msg.on { opacity:1; transform:translate(-50%,-50%) scale(1); }
</style>
</head>
<body>

<div id="hk-bg"></div>

<div id="scene">
  <canvas id="fc"></canvas>
  <canvas id="pc"></canvas>
  
  <div id="phrase1" class="phrase" style="top: 15%;">Eres mi casualidad más bonita...</div>
  <div id="phrase2" class="phrase" style="top: 30%;">Tu sonrisa es mi sol de cada día...</div>
  <div id="phrase3" class="phrase" style="top: 45%;">Eres todo para mí...</div>
  <div id="phrase4" class="phrase" style="top: 60%;">Mi persona favorita en el mundo...</div>

  <div id="msg">
    ¿Quieres ser mi novia? 💕
  </div>
</div>

<script>
const fc = document.getElementById('fc');
const fx = fc.getContext('2d');
const pc = document.getElementById('pc');
const px = pc.getContext('2d');
const scene = document.getElementById('scene');
const msg = document.getElementById('msg');
const hkBg = document.getElementById('hk-bg');

function resize() {
  fc.width = pc.width = scene.offsetWidth;
  fc.height = pc.height = scene.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Partículas ──────────────────────────────────────────────
class P {
  constructor(init) { this.reset(init); }
  reset(init) {
    this.x = Math.random() * pc.width;
    this.y = init ? Math.random() * pc.height : pc.height + 10;
    this.r = Math.random() * 5 + 3;
    this.vy = -(Math.random() * 0.8 + 0.3);
    this.vx = (Math.random() - 0.5) * 0.45;
    this.a = Math.random() * 0.5 + 0.2;
    this.life = 1;
    this.fade = Math.random() * 0.003 + 0.0015;
    this.rot = Math.random() * Math.PI * 2;
    this.rs = (Math.random() - 0.5) * 0.04;
    this.kind = Math.random() < 0.55 ? 'h' : (Math.random() < 0.5 ? 'p' : 'c');
    const cols = ['#e8104a','#f04070','#c8002e','#f07090','#b00028','#e05580'];
    this.col = cols[Math.floor(Math.random() * cols.length)];
  }
  tick() {
    this.x += this.vx; this.y += this.vy;
    this.life -= this.fade; this.rot += this.rs;
    if (this.life <= 0 || this.y < -15) this.reset(false);
  }
  draw(c) {
    c.save();
    c.globalAlpha = this.a * Math.max(0, this.life);
    c.translate(this.x, this.y);
    c.rotate(this.rot);
    c.fillStyle = this.col;
    if (this.kind === 'h') {
      const s = this.r;
      c.beginPath();
      c.moveTo(0, s*0.35);
      c.bezierCurveTo(-s*1.4,-s*0.5,-s*1.4,-s*1.4,0,-s*0.75);
      c.bezierCurveTo(s*1.4,-s*1.4,s*1.4,-s*0.5,0,s*0.35);
      c.fill();
    } else if (this.kind === 'p') {
      c.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i*4*Math.PI/5)-Math.PI/2, b = a+2*Math.PI/5;
        i===0 ? c.moveTo(Math.cos(a)*this.r,Math.sin(a)*this.r) : c.lineTo(Math.cos(a)*this.r,Math.sin(a)*this.r);
        c.lineTo(Math.cos(b)*this.r*0.4,Math.sin(b)*this.r*0.4);
      }
      c.closePath(); c.fill();
    } else {
      c.beginPath(); c.arc(0,0,this.r*0.55,0,Math.PI*2); c.fill();
    }
    c.restore();
  }
}
const pts = Array.from({length:50}, () => new P(true));

// ── Tulipán completo ──
function drawTulip(c, x, y, sz, alpha, tilt) {
  if (alpha <= 0) return;
  c.save();
  c.globalAlpha = Math.min(1, alpha);
  c.translate(x, y);
  c.rotate(tilt || 0);
  c.scale(sz, sz);

  function bp(angle, flip) {
    c.save();
    c.rotate(angle);
    c.scale(flip ? -1 : 1, 1);
    const g = c.createLinearGradient(0, 0.55, 0, -1.05);
    g.addColorStop(0,   '#2a000a');
    g.addColorStop(0.3, '#8a1020');
    g.addColorStop(0.75,'#c01830');
    g.addColorStop(1,   '#dd2848');
    c.fillStyle = g;
    c.strokeStyle = 'rgba(60,0,15,0.15)';
    c.lineWidth = 0.04;
    c.beginPath();
    c.moveTo(0, 0.55);
    c.bezierCurveTo(-0.38,0.3,-0.52,-0.2,-0.22,-0.92);
    c.bezierCurveTo(-0.08,-1.06,0.08,-1.06,0.22,-0.95);
    c.bezierCurveTo(0.48,-0.25,0.36,0.32,0,0.55);
    c.fill(); c.stroke();
    c.restore();
  }

  function fp(angle, flip) {
    c.save();
    c.rotate(angle);
    c.scale(flip ? -1 : 1, 1);
    const g = c.createLinearGradient(0, 0.5, 0, -1.0);
    g.addColorStop(0,   '#300010');
    g.addColorStop(0.25,'#9a1025');
    g.addColorStop(0.7, '#d81c38');
    g.addColorStop(1,   '#f02848');
    c.fillStyle = g;
    c.strokeStyle = 'rgba(60,0,15,0.12)';
    c.lineWidth = 0.035;
    c.beginPath();
    c.moveTo(0, 0.5);
    c.bezierCurveTo(-0.42,0.28,-0.58,-0.18,-0.26,-0.90);
    c.bezierCurveTo(-0.10,-1.05,0.10,-1.05,0.26,-0.92);
    c.bezierCurveTo(0.52,-0.22,0.4,0.30,0,0.5);
    c.fill(); c.stroke();
    c.strokeStyle = 'rgba(255,150,170,0.22)';
    c.lineWidth = 0.028;
    c.beginPath();
    c.moveTo(0,0.38); c.quadraticCurveTo(0.06,-0.2,0.08,-0.88);
    c.stroke();
    c.restore();
  }

  bp(-0.28, false);
  bp( 0.24, true);
  fp(-0.10, false);
  fp( 0.08, true);

  const gc = c.createLinearGradient(0, 0.45, 0, -1.02);
  gc.addColorStop(0,   '#2a000e');
  gc.addColorStop(0.3, '#a01020');
  gc.addColorStop(0.72,'#de1c3a');
  gc.addColorStop(1,   '#f52848');
  c.fillStyle = gc;
  c.strokeStyle = 'rgba(60,0,15,0.12)';
  c.lineWidth = 0.032;
  c.beginPath();
  c.moveTo(0, 0.45);
  c.bezierCurveTo(-0.36,0.22,-0.48,-0.22,-0.18,-0.94);
  c.bezierCurveTo(-0.07,-1.07,0.07,-1.07,0.18,-0.96);
  c.bezierCurveTo(0.44,-0.26,0.34,0.24,0,0.45);
  c.fill(); c.stroke();

  c.restore();
}

function drawStem(c, x0,y0,cx,cy,x1,y1,p,col,w) {
  if (p <= 0) return;
  const ex=x0+(x1-x0)*p, ey=y0+(y1-y0)*p;
  const ecx=x0+(cx-x0)*p, ecy=y0+(cy-y0)*p;
  c.save();
  c.strokeStyle=col; c.lineWidth=w; c.lineCap='round';
  c.beginPath(); c.moveTo(x0,y0); c.quadraticCurveTo(ecx,ecy,ex,ey); c.stroke();
  c.restore();
}

function drawLeaf(c,x1,y1,x2,y2,cpx,cpy,w,col,alpha) {
  if (alpha <= 0) return;
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  const nx=-dy/len*w, ny=dx/len*w;
  c.save();
  c.globalAlpha = Math.min(1, alpha);
  c.fillStyle=col; c.strokeStyle='rgba(20,55,10,0.22)'; c.lineWidth=1.2;
  c.beginPath();
  c.moveTo(x1,y1);
  c.quadraticCurveTo(cpx+nx*1.6,cpy+ny*1.6,x2,y2);
  c.quadraticCurveTo(cpx-nx*1.6,cpy-ny*1.6,x1,y1);
  c.fill(); c.stroke();
  c.restore();
}

// ── Loop principal ──────────────────────────────────────────
let t = 0, running = true, last = null;
const DUR = 22;

function frame(ts) {
  if (!running) return;
  if (!last) last = ts;
  t += (ts - last) / 1000;
  last = ts;
  const p = Math.min(t / DUR, 1);

  fx.clearRect(0,0,fc.width,fc.height);
  px.clearRect(0,0,pc.width,pc.height);
  pts.forEach(pt => { pt.tick(); pt.draw(px); });

  const W=fc.width, H=fc.height;
  const sc=Math.min(W,H)/5.0;
  const bx=W*0.5, by=H;
  const gc='#2e5c1e', sw=sc*0.044;

  const stems = [
    { dx:-0.38, dy:1.32, cx:-0.20, cdy:0.65, start:0.00 },
    { dx:-0.18, dy:1.70, cx:-0.10, cdy:0.88, start:0.04 },
    { dx: 0.02, dy:2.10, cx: 0.00, cdy:1.05, start:0.06 },
    { dx: 0.22, dy:1.72, cx: 0.10, cdy:0.85, start:0.04 },
    { dx: 0.42, dy:1.30, cx: 0.20, cdy:0.62, start:0.00 },
  ];

  stems.forEach(s => {
    const sp = p > s.start ? Math.min((p-s.start)/0.28,1) : 0;
    drawStem(fx, bx,by, bx+sc*s.cx,H-sc*s.cdy, bx+sc*s.dx,H-sc*s.dy, sp, gc, sw);
  });

  const leafP = p > 0.18 ? Math.min((p-0.18)/0.20,1) : 0;
  if (leafP > 0) {
    const ll=leafP*sc*0.55, rl=leafP*sc*0.50;
    drawLeaf(fx, bx-sc*0.08,H-sc*0.20, bx-sc*0.08-ll*0.85,H-sc*0.20-ll*0.78, bx-sc*0.16,H-sc*0.52, sc*0.10,'#2d6022',leafP);
    drawLeaf(fx, bx+sc*0.12,H-sc*0.24, bx+sc*0.12+rl*0.85,H-sc*0.24-rl*0.72, bx+sc*0.28,H-sc*0.54, sc*0.09,'#356a26',leafP);
  }
  if (p > 0.25) {
    const lp2=Math.min((p-0.25)/0.20,1);
    drawLeaf(fx, bx-sc*0.22,H-sc*0.55, bx-sc*0.22-lp2*sc*0.45*0.8,H-sc*0.55-lp2*sc*0.45*0.75, bx-sc*0.30,H-sc*0.78, sc*0.085,'#306020',lp2);
    drawLeaf(fx, bx+sc*0.24,H-sc*0.58, bx+sc*0.24+lp2*sc*0.42*0.82,H-sc*0.58-lp2*sc*0.42*0.72, bx+sc*0.32,H-sc*0.80, sc*0.082,'#357025',lp2);
  }

  const tulips = [
    { dx:-0.38, dy:1.32, sz:0.82, tilt:-0.18, start:0.30, dur:0.16 },
    { dx:-0.18, dy:1.70, sz:0.88, tilt:-0.08, start:0.40, dur:0.16 },
    { dx: 0.02, dy:2.10, sz:0.95, tilt: 0.00, start:0.52, dur:0.16 },
    { dx: 0.22, dy:1.72, sz:0.88, tilt: 0.08, start:0.40, dur:0.16 },
    { dx: 0.42, dy:1.30, sz:0.82, tilt: 0.18, start:0.30, dur:0.16 },
  ];

  tulips.forEach(td => {
    const alpha = p > td.start ? Math.min((p-td.start)/td.dur,1) : 0;
    drawTulip(fx, bx+sc*td.dx, H-sc*td.dy, sc*td.sz, alpha, td.tilt);
  });

  if (p < 1) requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

// ── Control de tiempos (Frases y Final) ─────────────────────

// Aparecen las frases poco a poco
setTimeout(() => document.getElementById('phrase1').style.opacity = '1', 4000);
setTimeout(() => document.getElementById('phrase2').style.opacity = '1', 8000);
setTimeout(() => document.getElementById('phrase3').style.opacity = '1', 12000);
setTimeout(() => document.getElementById('phrase4').style.opacity = '1', 16000);

// Transición final
setTimeout(() => {
  // Desaparecen las frases y los tulipanes
  const phrases = document.querySelectorAll('.phrase');
  phrases.forEach(p => p.style.opacity = '0');
  
  fc.style.transition = 'opacity 1.6s ease';
  fc.style.opacity = '0';
  
  // Aparece el fondo de Hello Kitty de manera suave
  hkBg.style.opacity = '1';
  
  setTimeout(() => { 
    running=false; 
    msg.classList.add('on'); 
  }, 1500);
}, 23000); // Esto ocurre a los 23 segundos
</script>
</body>
</html>
